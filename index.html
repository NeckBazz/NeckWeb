<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NeckBazz</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
scroll-behavior:smooth;
}

/* barra superior */

nav{
position:fixed;
top:0;
width:100%;
background:black;
padding:20px;
display:flex;
justify-content:center;
gap:60px;
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
font-size:26px;
font-weight:bold;
}

nav a:hover{
color:red;
}

/* secciones separadas */

.section{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

/* inicio */

#inicio h1{
font-size:100px;
margin:0;
}

#inicio p{
font-size:30px;
}

/* fanarts */

.fanart-title{
font-size:90px;
font-weight:bold;
background:linear-gradient(90deg,#ff4d4d,#ffd93b,#4dff88,#4db8ff,#c84dff);
-webkit-background-clip:text;
color:transparent;
margin-bottom:40px;
}

.galeria{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

.galeria img{
width:220px;
border-radius:12px;
}

/* redes */

.redes{
display:flex;
gap:40px;
margin-top:20px;
}

.boton{
padding:18px 40px;
font-size:24px;
border-radius:10px;
border:2px solid white;
cursor:pointer;
}

.youtube{
background:red;
color:white;
}

.tiktok{
background:black;
color:white;
}

</style>
</head>

<body>

<nav>
<a href="#inicio">Inicio</a>
<a href="#fanart">Fanarts</a>
<a href="#redes">Redes</a>
</nav>

<section id="inicio" class="section">

<h1>NeckBazz</h1>
<p>Gracias por apoyar el canal</p>

</section>

<section id="fanart" class="section">

<h2 class="fanart-title">FANARTS</h2>

<div class="galeria">

<img src="fanart1.jpg">
<img src="fanart2.jpg">
<img src="fanart3.jpg">

</div>

</section>

<section id="redes" class="section">

<h2 style="font-size:70px;">Redes</h2>

<div class="redes">

<a href="https://www.youtube.com/@Neckbazz">
<button class="boton youtube">YouTube</button>
</a>

<a href="https://www.tiktok.com/@neckbazzyts?_r=1&_t=ZS-94WwpRtQ9n5">
<button class="boton tiktok">TikTok</button>
</a>

</div>

</section>

</body>
</html>
