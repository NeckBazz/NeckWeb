<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NeckBazz</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
text-align:center;
}

/* barra superior */

nav{
position:fixed;
top:0;
width:100%;
background:black;
padding:20px;
display:flex;
justify-content:center;
gap:60px;
z-index:1000;
}

nav a{
color:white;
text-decoration:none;
font-size:28px;
font-weight:bold;
}

nav a:hover{
color:red;
}

/* secciones */

section{
padding:140px 20px;
}

/* titulo principal */

h1{
font-size:90px;
margin-bottom:10px;
}

/* subtitulo */

.sub{
font-size:30px;
}

/* titulo fanarts */

.fanart-title{
font-size:80px;
font-weight:bold;
background:linear-gradient(90deg,#ff4d4d,#ffd93b,#4dff88,#4db8ff,#c84dff);
-webkit-background-clip:text;
color:transparent;
}

/* galeria */

.galeria{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
margin-top:40px;
}

.galeria img{
width:220px;
border-radius:12px;
}

/* botones redes */

.redes{
display:flex;
justify-content:center;
gap:40px;
margin-top:30px;
}

.boton{
padding:15px 35px;
font-size:22px;
border-radius:10px;
border:2px solid white;
cursor:pointer;
}

.youtube{
background:red;
color:white;
}

.tiktok{
background:black;
color:white;
}

</style>
</head>

<body>

<nav>
<a href="#inicio">Inicio</a>
<a href="#fanart">Fanarts</a>
<a href="#redes">Redes</a>
</nav>

<section id="inicio">

<h1>NeckBazz</h1>
<p class="sub">Gracias por apoyar el canal</p>

</section>

<section id="fanart">

<h2 class="fanart-title">FANARTS</h2>

<div class="galeria">

<img src="fanart1.jpg">
<img src="fanart2.jpg">
<img src="fanart3.jpg">

</div>

</section>

<section id="redes">

<h2 style="font-size:60px;">Redes</h2>

<div class="redes">

<a href="https://www.youtube.com/@Neckbazz">
<button class="boton youtube">YouTube</button>
</a>

<a href="https://www.tiktok.com/@neckbazzyts?_r=1&_t=ZS-94WwpRtQ9n5">
<button class="boton tiktok">TikTok</button>
</a>

</div>

</section>

</body>
</html>
